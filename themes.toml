# themes.toml — ticker → theme mapping for the Agent WatchList
#
# This file is the canonical source of theme metadata. The Robinhood watchlist
# ("Agent WatchList") is the canonical source of which tickers are in the universe;
# this file records which theme each ticker belongs to.
#
# Keep in sync: any add/remove to the Agent WatchList must also update this file
# in the same operation. The `theme` field in trade-log.jsonl is populated from here.

[nuclear]
tickers = ["CEG", "VST", "CCJ", "BWXT", "SMR"]

[robotics]
tickers = ["ISRG", "TER", "ROK", "PATH"]

[space]
tickers = ["RKLB", "ASTS", "LMT", "LUNR"]

[ai]
tickers = ["NVDA", "AMD", "ARM", "PLTR", "ANET"]

[data_centers]
tickers = ["EQIX", "DLR", "VRT", "SMCI", "GEV", "CRWV", "NBIS", "ORCL", "APLD"]

[cybersecurity]
tickers = ["CRWD", "PANW", "ZS", "FTNT"]

[semiconductors]
tickers = ["AVGO", "AMAT", "LRCX", "MU", "MRVL"]

[quantum_computing]
tickers = ["IONQ", "QBTS", "RGTI"]

[defense_tech]
tickers = ["RTX", "NOC", "KTOS", "AXON"]
