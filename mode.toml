# AI Trading Agent SOP — execution mode
# Edit this file to control how the SOP behaves on every invocation.
# Schema: references/rules.md §1.1

# "paper" → SOP runs end-to-end but never invokes a Robinhood MCP order tool.
# "live"  → SOP places real orders.
mode = "paper"

# Empty list = all tickers eligible when in live mode.
# Populated list = ONLY these tickers may receive live orders.
# Use to stage the rollout: ["AAPL"] → ["AAPL","MSFT"] → [] (open).
live_allowlist = []

# true  = pause for explicit user "yes" in chat before every live order.
# false = auto-execute live orders, gated only by allowlist, risk caps, kill switch.
require_manual_confirm = true

# Global blocklist — overrides everything, including signal A+B+C bonuses.
block_tickers = []

# Daily loss cap as a fraction of Agentic-account equity. Halts new entries on breach.
daily_loss_cap_pct = 0.02

# Total cluster-signal exposure cap.
max_cluster_exposure_pct = 0.25

# Per-ticker exposure cap (default for tickers NOT in watchlist.json).
# Watchlist symbols use their own max_allocation_pct instead.
max_ticker_exposure_pct = 0.05

# Two-agent risk review (references/risk-review.md, .claude/agents/risk-reviewer.md).
# true  = every candidate trade is reviewed by the risk-reviewer subagent before
#         any MCP order tool fires. Rejected trades still log to trade-log.jsonl
#         with result = "rejected_by_risk_review".
# false = Trader executes without a second-agent rule-check. Use only during the
#         very first paper-mode shakedown before the Reviewer scaffolding is
#         validated end-to-end.
require_risk_review = true

# Time-state policy (references/time-state.md).
# true  = honor State A/B/C modifiers: State A halves position size and widens
#         the spread filter; State B blocks medium/low-tier entries; State C
#         tightens trailing stops and is the cleanest execution window.
# false = treat every session minute as State B baseline. Use only during
#         dry-runs that need consistent behavior across the day.
respect_time_state = true

# Opt-in: in State C (Power Hour 15:00–16:00 ET), bump medium/high tier sizes
# by +0.25 percentage points. Off by default; only enable after time-state
# analytics validate that State C trades have measurably better outcomes.
state_c_size_bump = false

# Signal C (social media) — DRAFT, off by default. See references/social-signal.md.
[signal_c]
active = false
trial = true
sources = ["apewisdom"]
